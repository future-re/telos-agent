name: Release Desktop

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.2.0) — overrides tauri.conf.json'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            os: windows-latest
            artifact_glob: |
              target/release/bundle/nsis/*.exe
              target/release/bundle/msi/*.msi

          - target: macos
            os: macos-latest
            artifact_glob: |
              target/release/bundle/**/*.dmg
              target/release/bundle/**/*.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust version
        run: rustup show

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Determine app version
        id: app-version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -e "console.log(require('./desktop/src-tauri/tauri.conf.json').version)")"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Override app version
        shell: bash
        run: |
          echo "Overriding version to ${{ steps.app-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('desktop/src-tauri/tauri.conf.json','utf8'));
            conf.version = '${{ steps.app-version.outputs.version }}';
            fs.writeFileSync('desktop/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build desktop app
        working-directory: desktop
        run: npm run tauri build

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Bundle output ==="
          find target/release/bundle -type f 2>/dev/null || echo "(no bundle dir)"
          echo "---"
          echo "dmg/*.dmg:" $(ls target/release/bundle/dmg/*.dmg 2>/dev/null || echo "(none)")
          echo "macos/*.app:" $(ls target/release/bundle/macos/*.app 2>/dev/null || echo "(none)")
          echo "macos/*.tar.gz:" $(ls target/release/bundle/macos/*.tar.gz 2>/dev/null || echo "(none)")

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: telos-desktop-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Windows artifacts
        id: download-windows
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: telos-desktop-windows
          path: artifacts/windows

      - name: Download macOS artifacts
        id: download-macos
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: telos-desktop-macos
          path: artifacts/macos

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --tag ${{ github.ref_name }} --output CHANGELOG_RELEASE.md

      - name: Calculate SHA256 checksums
        shell: bash
        run: |
          echo '## 校验' > checksums.md
          echo '```' >> checksums.md
          echo '# SHA256' >> checksums.md
          echo '' >> checksums.md
          find artifacts -type f -print0 | sort -z | while IFS= read -r -d '' f; do
            name=$(basename "$f")
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            echo "$name" >> checksums.md
            echo "$sha" >> checksums.md
            echo '' >> checksums.md
          done
          echo '```' >> checksums.md

      - name: Build release body
        shell: bash
        run: |
          cat > RELEASE_BODY.md <<'EOF'
          ## 安装

          ### Windows
          下载 \`telos_*_x64-setup.exe\` 双击安装。

          ### macOS
          下载 \`telos_*.dmg\`，双击挂载后将 \`telos.app\` 拖入 Applications 文件夹。
          > 首次打开如果提示"无法验证开发者"，请在系统设置 → 隐私与安全中点击"仍然打开"。

          EOF
          cat checksums.md >> RELEASE_BODY.md
          echo '' >> RELEASE_BODY.md
          cat CHANGELOG_RELEASE.md >> RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: telos ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: |
            artifacts/windows/*
            artifacts/macos/*
          draft: false
          prerelease: false
