name: Release Desktop

on:
  push:
    tags: ['v[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 0.2.0) — overrides tauri.conf.json'
        required: false
        type: string
      runtime_source:
        description: 'Runtime source for full installers: online downloads or vendored offline artifacts'
        required: false
        default: online
        type: choice
        options:
          - online
          - vendored

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.target }}-${{ matrix.variant }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows
            variant: full
            os: windows-latest
            runtime_bundle: true

          - target: windows
            variant: online
            os: windows-latest
            runtime_bundle: false

          - target: macos
            variant: online
            os: macos-latest
            runtime_bundle: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python for runtime bundling
        if: matrix.runtime_bundle
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Rust version
        run: rustup show

      - name: Cache Rust
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Determine app version
        id: app-version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(node -e "console.log(require('./desktop/src-tauri/tauri.conf.json').version)")"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Override app version
        shell: bash
        run: |
          echo "Overriding version to ${{ steps.app-version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('desktop/src-tauri/tauri.conf.json','utf8'));
            conf.version = '${{ steps.app-version.outputs.version }}';
            fs.writeFileSync('desktop/src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Prepare bundled Python automation runtime
        if: matrix.runtime_bundle
        shell: pwsh
        run: |
          if ("${{ inputs.runtime_source || 'online' }}" -eq "vendored") {
            ./scripts/prepare-python-runtime.ps1
          } else {
            ./scripts/prepare-python-runtime.ps1 -AllowDownload -UseLocalPython
          }

      - name: Build desktop app
        working-directory: desktop
        run: npm run tauri build

      - name: List bundle output
        shell: bash
        run: |
          echo "=== Bundle output ==="
          find target/release/bundle -type f 2>/dev/null || echo "(no bundle dir)"
          echo "---"
          echo "dmg/*.dmg:" $(ls target/release/bundle/dmg/*.dmg 2>/dev/null || echo "(none)")
          echo "macos/*.app:" $(ls target/release/bundle/macos/*.app 2>/dev/null || echo "(none)")
          echo "macos/*.tar.gz:" $(ls target/release/bundle/macos/*.tar.gz 2>/dev/null || echo "(none)")

      - name: Stage variant artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist-desktop/${{ matrix.target }}-${{ matrix.variant }}"
          find target/release/bundle -type f \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.tar.gz' \) -print0 |
            while IFS= read -r -d '' file; do
              base="$(basename "$file")"
              ext="${base##*.}"
              stem="${base%.*}"
              cp "$file" "dist-desktop/${{ matrix.target }}-${{ matrix.variant }}/${stem}-${{ matrix.variant }}.${ext}"
            done
          count="$(find "dist-desktop/${{ matrix.target }}-${{ matrix.variant }}" -type f | wc -l | tr -d ' ')"
          if [ "$count" = "0" ]; then
            echo "No bundle artifacts staged" >&2
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: telos-desktop-${{ matrix.target }}-${{ matrix.variant }}
          path: dist-desktop/${{ matrix.target }}-${{ matrix.variant }}/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          pattern: telos-desktop-*
          merge-multiple: false

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --tag ${{ github.ref_name }} --output CHANGELOG_RELEASE.md

      - name: Calculate SHA256 checksums
        shell: bash
        run: |
          echo '## 校验' > checksums.md
          echo '```' >> checksums.md
          echo '# SHA256' >> checksums.md
          echo '' >> checksums.md
          find artifacts -type f -print0 | sort -z | while IFS= read -r -d '' f; do
            name=$(basename "$f")
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            echo "$name" >> checksums.md
            echo "$sha" >> checksums.md
            echo '' >> checksums.md
          done
          echo '```' >> checksums.md

      - name: Build release body
        shell: bash
        run: |
          cat > RELEASE_BODY.md <<'EOF'
          ## 安装

          ### Windows
          - \`*-full.*\`：完整离线安装包，内置 Python、Playwright、Chromium 和常用办公/网页解析包。
          - \`*-online.*\`：轻量安装包，不内置自动化 runtime；适合后续在线下载 runtime 的渠道。

          ### macOS
          下载 \`telos_*.dmg\`，双击挂载后将 \`telos.app\` 拖入 Applications 文件夹。
          > 首次打开如果提示"无法验证开发者"，请在系统设置 → 隐私与安全中点击"仍然打开"。

          EOF
          cat checksums.md >> RELEASE_BODY.md
          echo '' >> RELEASE_BODY.md
          cat CHANGELOG_RELEASE.md >> RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: telos ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
