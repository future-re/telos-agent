[package]
name = "telos-cli"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Terminal interface for telos-agent"

[[bin]]
name = "telos"
path = "src/main.rs"

[lib]
name = "telos_cli"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
async-trait = "0.1"
clap = { version = "4", features = ["derive", "env", "wrap_help"] }
clap_complete = "4"
crossterm = { version = "0.28", features = ["event-stream"] }
dirs = "5"
futures-util = "0.3"
glob = "0.3"
ratatui = "0.29"
rpassword = "7"
rustyline = { version = "14", default-features = false, features = ["with-file-history"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
termimad = "0.30"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "io-std"] }
toml = "0.8"
tui-textarea = "0.7"
telos_agent = { path = "../core" }
tracing = "0.1"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
tempfile = "3"
